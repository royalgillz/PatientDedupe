name: Deploy to Hugging Face Space

# Ships the product to the Hugging Face Docker Space on every push to main. We stage
# the Dockerfile plus the backend and frontend source (no node_modules, no secrets)
# and upload it; Hugging Face builds the image and serves it. The database lives in
# Supabase, supplied to the running container through the DATABASE_URL Space secret.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/README.space.md"
      - ".github/workflows/deploy-space.yml"
  workflow_dispatch:

concurrency:
  group: deploy-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Stage the Space build context
        run: |
          mkdir -p staging
          cp Dockerfile .dockerignore staging/
          cp deploy/README.space.md staging/README.md
          cp -r backend staging/backend
          cp -r frontend staging/frontend
          rm -rf staging/backend/node_modules staging/frontend/node_modules \
                 staging/frontend/dist staging/backend/.env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"

      - name: Upload to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload Sehajgill/PatientDedupe ./staging . \
            --repo-type space \
            --delete "*" \
            --commit-message "Deploy from ${GITHUB_SHA}"
